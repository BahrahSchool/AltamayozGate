<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التميز الرقمي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc, arrayUnion, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        window.FB = { initializeApp, getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc, arrayUnion, setDoc, getDoc, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; direction: rtl; margin: 0; overflow-x: hidden; }
        * { font-style: normal !important; }
        .sidebar-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-item-active { background-color: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); transform: scale(1.02); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dashboard-card { border-radius: 1.5rem; border: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .error-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .admin-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .calendar-day-active { background: #4f46e5; color: white; border-radius: 0.75rem; }
        .comment-bubble { background: #f1f5f9; border-radius: 12px; padding: 8px 12px; margin-bottom: 6px; font-size: 11px; }
        .stat-progress { height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .stat-progress-bar { height: 100%; transition: width 1s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { 
            apiKey: "AIzaSyDslMEStik2JmiKoQbnCcQT7ZcLg4cldDg",
            authDomain: "excellenceplatform-96336.firebaseapp.com",
            projectId: "excellenceplatform-96336",
            storageBucket: "excellenceplatform-96336.firebasestorage.app",
            messagingSenderId: "96997505418",
            appId: "1:96997505418:web:07ab652f31571a9c913073",
            measurementId: "G-58JFCF1KX1"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'excellence-pro-system';

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                award: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/></g>,
                megaphone: <path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="m3 11 18-5v12L3 14v-3z"/>,
                plus: <path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="M12 5v14M5 12h14"/>,
                users: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></g>,
                trending: <path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="m22 7-8.5 8.5-5-5L2 17M16 7h6v6"/>,
                logout: <path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="M9 21H5a2 2-0 0 1-2-2V5a2 2-0 0 1 2-2h4m7 14 5-5-5-5m5 5H9"/>,
                check: <path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="M20 6L9 17l-5-5"/>,
                x: <path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="M18 6 6 18M6 6l12 12"/>,
                user: <g fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></g>,
                trash: <path fill="none" stroke="currentColor" strokeWidth="2" d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>,
                calendar: <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke="currentColor" strokeWidth="2"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" strokeWidth="2"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" strokeWidth="2"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" strokeWidth="2"/></g>,
                upload: <path fill="none" stroke="currentColor" strokeWidth="2" d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5-5 5 5m-5-5v12"/>,
                clock: <g fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></g>,
                chart: <path fill="none" stroke="currentColor" strokeWidth="2" d="M12 20V10M18 20V4M6 20v-4"/>,
                message: <path fill="none" stroke="currentColor" strokeWidth="2" d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2-0 0 1 2-2h14a2 2-0 0 1 2 2z"/>,
                send: <path fill="none" stroke="currentColor" strokeWidth="2" d="m22 2-7 20-4-9-9-4 20-7Z"/>,
                chevronRight: <path fill="none" stroke="currentColor" strokeWidth="2" d="m9 18 6-6-6-6"/>,
                chevronLeft: <path fill="none" stroke="currentColor" strokeWidth="2" d="m15 18-6-6 6-6"/>,
                file: <g><path fill="none" stroke="currentColor" strokeWidth="2" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6" stroke="currentColor" strokeWidth="2"/></g>,
                lock: <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></g>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" className={className}>{icons[name] || <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2" fill="none"/>}</svg>;
        };

        const App = () => {
            const [adminData, setAdminData] = React.useState({ id: 'master', name: "إيمان الحربي", roleLabel: 'مدير المدرسة', username: 'admin', password: '1230', phone: "0500000000" });

            const [userAuth, setUserAuth] = React.useState(null);
            const [currentUser, setCurrentUser] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
            const [loginData, setLoginData] = React.useState({ user: '', pass: '' });
            const [loginError, setLoginError] = React.useState('');
            const [showModal, setShowModal] = React.useState(null);
            const [zoomMedia, setZoomMedia] = React.useState(null);
            const [isProcessingFile, setIsProcessingFile] = React.useState(false);
            
            const [posts, setPosts] = React.useState([]);
            const [members, setMembers] = React.useState([]);
            const [tasks, setTasks] = React.useState([]);
            const [taskCommentInputs, setTaskCommentInputs] = React.useState({});
            
            const [newPost, setNewPost] = React.useState({ title: '', content: '', type: 'إعلان عام', duration: 'يوم', mediaData: null });
            const [newMember, setNewMember] = React.useState({ name: '', roleLabel: '', username: '', password: '', phone: '' });
            const [newTask, setNewTask] = React.useState({ title: '', content: '', assignedTo: '', taskDate: '', fileData: null, status: 'pending' });
            
            const [recoveryPhone, setRecoveryPhone] = React.useState('');
            const [recoveryUser, setRecoveryUser] = React.useState('');
            const [recoveryStatus, setRecoveryStatus] = React.useState('');
            const [tempNewPass, setTempNewPass] = React.useState('');
            const [postError, setPostError] = React.useState('');
            const [successMsg, setSuccessMsg] = React.useState('');
            
            const [completingTask, setCompletingTask] = React.useState(null);
            const [taskProof, setTaskProof] = React.useState(null);

            const [newPasswordValue, setNewPasswordValue] = React.useState('');

            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            const hijriDate = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day: 'numeric', month: 'long', year: 'numeric'}).format(today);

            React.useEffect(() => {
                const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FB;
                const fbApp = initializeApp(firebaseConfig);
                const auth = getAuth(fbApp);
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                        else await signInAnonymously(auth);
                    } catch (e) {}
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUserAuth);
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!userAuth) return;
                const { getFirestore, collection, onSnapshot, doc } = window.FB;
                const db = getFirestore();
                const setup = (col, setter) => onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', col), 
                    s => setter(s.docs.map(d => ({id: d.id, ...d.data()}))),
                    err => console.error(err)
                );
                setup('posts', setPosts); setup('members', setMembers); setup('tasks', setTasks);
                
                // Monitor Admin Settings for persistent password
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'admin'), (s) => {
                    if (s.exists()) setAdminData(prev => ({...prev, ...s.data()}));
                });
            }, [userAuth]);

            const handleLogin = () => {
                const all = [adminData, ...members];
                const found = all.find(u => u.username === loginData.user && u.password === loginData.pass);
                if (found) { setCurrentUser(found); setLoginError(''); }
                else setLoginError("بيانات الدخول غير صحيحة.");
            };

            const handleRecoveryRequest = async () => {
                const all = [adminData, ...members];
                const found = all.find(u => u.phone === recoveryPhone && u.username === recoveryUser);
                if (found) { setTempNewPass(found.password); setShowModal('recovery-success'); setRecoveryStatus(''); }
                else setRecoveryStatus("بيانات التحقق غير متطابقة، يرجى التأكد من اسم المستخدم ورقم الجوال.");
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setActiveTab('dashboard');
                setLoginData({ user: '', pass: '' });
                setShowModal(null);
            };

            const handleUpdatePassword = async () => {
                if (!newPasswordValue || newPasswordValue.length < 6) {
                    setPostError("كلمة المرور يجب أن تكون 6 خانات على الأقل.");
                    return;
                }
                const { getFirestore, doc, updateDoc, setDoc } = window.FB;
                const db = getFirestore();
                
                try {
                    if (currentUser.id === 'master') {
                        // Persist admin password in dedicated settings collection
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'admin'), {
                            password: newPasswordValue
                        }, { merge: true });
                        setCurrentUser(prev => ({...prev, password: newPasswordValue}));
                    } else {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', currentUser.id), {
                            password: newPasswordValue
                        });
                        setCurrentUser(prev => ({...prev, password: newPasswordValue}));
                    }
                    setSuccessMsg("تم تحديث كلمة المرور بنجاح ✅");
                    setPostError('');
                    setNewPasswordValue('');
                    setTimeout(() => { setShowModal(null); setSuccessMsg(''); }, 2000);
                } catch (e) {
                    setPostError("حدث خطأ أثناء الاتصال بقاعدة البيانات.");
                }
            };

            const save = async (col, data) => {
                const alphaNumRegex = /^[a-zA-Z0-9]+$/;
                const phoneRegex = /^05\d{8}$/;

                if (col === 'posts' && (!data.title.trim() || !data.content.trim())) { setPostError("يرجى كتابة العنوان والمحتوى."); return; }
                if (col === 'members') {
                    if (!data.name.trim() || !data.username.trim() || !data.password.trim() || !data.phone.trim()) { setPostError("يرجى تعبئة كافة الحقول."); return; }
                    if (!alphaNumRegex.test(data.username)) { setPostError("اسم المستخدم إنجليزي فقط."); return; }
                    
                    const usernameExists = members.some(m => m.username === data.username) || data.username === adminData.username;
                    if (usernameExists) { setPostError("اسم المستخدم مسجل مسبقاً، يرجى اختيار اسم آخر."); return; }
                    
                    if (data.password.length < 6) { setPostError("كلمة المرور 6 خانات كأدنى حد."); return; }
                    if (!phoneRegex.test(data.phone)) { setPostError("الجوال 10 أرقام ويبدأ بـ 05."); return; }
                }
                if (col === 'tasks' && (!data.title.trim() || !data.assignedTo)) { setPostError("يرجى تحديد العنوان والعضو المسند إليه."); return; }

                const { getFirestore, collection, addDoc } = window.FB;
                try {
                    await addDoc(collection(getFirestore(), 'artifacts', appId, 'public', 'data', col), { 
                        ...data, createdAt: new Date().toISOString(), author: currentUser.name 
                    });
                    setShowModal(null); setPostError('');
                    if (col === 'posts') setNewPost({ title: '', content: '', type: 'إعلان عام', duration: 'يوم', mediaData: null });
                    else if (col === 'tasks') setNewTask({ title: '', content: '', assignedTo: '', taskDate: '', fileData: null, status: 'pending' });
                    else if (col === 'members') setNewMember({ name: '', roleLabel: '', username: '', password: '', phone: '' });
                } catch (e) { setPostError("خطأ في الحفظ."); }
            };

            const toggleTaskStatus = async (task, proof = null) => {
                const { getFirestore, doc, updateDoc } = window.FB;
                await updateDoc(doc(getFirestore(), 'artifacts', appId, 'public', 'data', 'tasks', task.id), {
                    status: task.status === 'done' ? 'pending' : 'done',
                    proofData: proof || null
                });
                setCompletingTask(null); setTaskProof(null);
            };

            const handleTaskComment = async (taskId) => {
                const text = taskCommentInputs[taskId];
                if (!text || text.trim() === "") return;
                const { getFirestore, doc, updateDoc, arrayUnion } = window.FB;
                await updateDoc(doc(getFirestore(), 'artifacts', appId, 'public', 'data', 'tasks', taskId), {
                    comments: arrayUnion({ author: currentUser.name, text: text.trim(), date: new Date().toISOString() })
                });
                setTaskCommentInputs(prev => ({...prev, [taskId]: ""}));
            };

            const processFile = (e, target) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsProcessingFile(true);
                const reader = new FileReader();
                reader.onload = (event) => {
                    if (file.type.startsWith('image/')) {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width; let height = img.height;
                            const maxDim = 800;
                            if (width > maxDim || height > maxDim) {
                                if (width > height) { height *= maxDim / width; width = maxDim; }
                                else { width *= maxDim / height; height = maxDim; }
                            }
                            canvas.width = width; canvas.height = height;
                            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                            const compressed = canvas.toDataURL('image/jpeg', 0.4);
                            if (target === 'post') setNewPost(prev => ({...prev, mediaData: compressed}));
                            else if (target === 'task') setNewTask(prev => ({...prev, fileData: compressed}));
                            else if (target === 'proof') setTaskProof(compressed);
                            setIsProcessingFile(false);
                        };
                        img.src = event.target.result;
                    } else {
                        if (target === 'post') setNewPost(prev => ({...prev, mediaData: event.target.result}));
                        else if (target === 'task') setNewTask(prev => ({...prev, fileData: event.target.result}));
                        else if (target === 'proof') setTaskProof(event.target.result);
                        setIsProcessingFile(false);
                    }
                };
                reader.readAsDataURL(file);
            };

            const totalTasksCount = tasks.length;
            const doneTasksCount = tasks.filter(t => t.status === 'done').length;
            const completionPercentage = totalTasksCount > 0 ? Math.round((doneTasksCount / totalTasksCount) * 100) : 0;
            
            const teamNames = [adminData.name, ...members.map(m => m.name)];
            const teamPerformance = teamNames.map(name => {
                const mTasks = tasks.filter(t => t.assignedTo === name);
                const mDone = mTasks.filter(t => t.status === 'done').length;
                const mPending = mTasks.length - mDone;
                const mRate = mTasks.length > 0 ? Math.round((mDone / mTasks.length) * 100) : 0;
                return { name, total: mTasks.length, done: mDone, pending: mPending, rate: mRate };
            });

            if (!currentUser) return (
                <div className="flex items-center justify-center min-h-screen bg-slate-100 p-6">
                    <div className="bg-white p-10 dashboard-card shadow-2xl w-full max-w-sm text-center border relative font-black">
                        <div className="bg-slate-950 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl admin-pulse text-amber-400 font-black"><Icon name="award" size={28} /></div>
                        <h1 className="text-xl font-black mb-8 tracking-tighter uppercase text-slate-900 font-black text-center">بوابة التميز الرقمي</h1>
                        <div className="space-y-4 text-right font-black">
                            {loginError && <div className="bg-rose-50 text-rose-600 p-3 rounded-xl text-xs font-black mb-4 border border-rose-100 error-shake text-center">{loginError}</div>}
                            <input className="w-full p-4 bg-slate-50 rounded-xl text-right outline-none border focus:border-indigo-500 font-black shadow-inner" placeholder="اسم المستخدم" onChange={e=>setLoginData({...loginData, user: e.target.value})} />
                            <input className="w-full p-4 bg-slate-50 rounded-xl text-right outline-none border focus:border-indigo-500 font-black shadow-inner" type="password" placeholder="كلمة المرور" onChange={e=>setLoginData({...loginData, pass: e.target.value})} onKeyDown={e=>e.key==='Enter' && handleLogin()}/>
                            <button onClick={handleLogin} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-lg hover:bg-slate-900 transition-all uppercase text-center font-black">دخول</button>
                            <button onClick={() => {setShowModal('forgot'); setRecoveryStatus(''); setRecoveryPhone(''); setRecoveryUser('');}} className="text-[11px] font-black text-slate-400 hover:text-indigo-600 uppercase mt-4 block w-full text-center tracking-widest font-black">هل نسيت كلمة المرور ؟</button>
                        </div>
                    </div>
                    {showModal === 'forgot' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[1100] flex items-center justify-center p-6 text-right font-black">
                            <div className="bg-white rounded-[2rem] p-10 max-w-sm w-full shadow-2xl animate-in zoom-in-95 duration-300 font-black">
                                <h3 className="text-xl font-black mb-4 uppercase">استعادة كلمة المرور</h3>
                                {recoveryStatus && <div className="bg-rose-50 text-rose-600 p-3 rounded-xl text-[10px] mb-4 border border-rose-100">{recoveryStatus}</div>}
                                <div className="space-y-4 font-black">
                                    <input className="w-full p-4 bg-slate-50 rounded-xl font-black border outline-none text-right" placeholder="اسم المستخدم" value={recoveryUser} onChange={e=>setRecoveryUser(e.target.value)}/>
                                    <input className="w-full p-4 bg-slate-50 rounded-xl font-black border outline-none text-center tracking-widest" placeholder="05xxxxxxxx" value={recoveryPhone} onChange={e=>setRecoveryPhone(e.target.value.replace(/\D/g, '').substring(0, 10))}/>
                                </div>
                                <div className="flex gap-3 mt-6">
                                    <button onClick={handleRecoveryRequest} className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-black uppercase shadow-md">تحقق</button>
                                    <button onClick={()=>setShowModal(null)} className="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-black uppercase">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showModal === 'recovery-success' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[1100] flex items-center justify-center p-6 text-center font-black">
                            <div className="bg-white rounded-[2.5rem] p-10 max-w-sm w-full shadow-2xl animate-in zoom-in-95 duration-300 font-black">
                                <div className="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 font-black"><Icon name="check" size={32} /></div>
                                <h3 className="text-xl font-black mb-2 uppercase">تم التحقق</h3>
                                <div className="bg-indigo-50 p-5 rounded-2xl border-2 border-dashed border-indigo-100 mb-6 font-black">
                                    <p className="text-[10px] font-black text-indigo-400 mb-1 uppercase text-center font-black">كلمة المرور الخاصة بك هي:</p>
                                    <p className="text-2xl font-black text-indigo-600 tracking-widest text-center font-black">{tempNewPass}</p>
                                </div>
                                <button onClick={()=>setShowModal(null)} className="w-full bg-slate-900 text-white py-3 rounded-xl font-black shadow-md uppercase font-black">العودة للدخول</button>
                            </div>
                        </div>
                    )}
                </div>
            );

            const isAdmin = currentUser.id === 'master';

            return (
                <div className="flex h-screen overflow-hidden text-right font-black">
                    <aside className={`${sidebarCollapsed ? 'w-20' : 'w-64'} bg-white border-l flex flex-col p-5 z-50 sidebar-transition shadow-sm shrink-0 font-black`}>
                        <button onClick={()=>setSidebarCollapsed(!sidebarCollapsed)} className="absolute -left-3 top-20 bg-indigo-600 text-white p-1 rounded-full shadow-xl z-60 border-2 border-white"><Icon name={sidebarCollapsed ? "chevronRight" : "chevronLeft"} size={14}/></button>
                        <div className={`flex items-center ${sidebarCollapsed ? 'justify-center' : 'gap-3'} mb-10 font-black`}>

                                            <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 text-3xl group-hover:bg-indigo-600 group-hover:text-white transition-all font-black font-black font-black">{m.name.charAt(0)}</div><h4 className="text-xl font-black mb-2 font-black font-black font-black">{m.name}</h4><span className="text-[10px] font-black text-indigo-700 bg-indigo-50 px-4 py-1.5 rounded-xl uppercase mb-4 inline-block font-black font-black font-black">{m.roleLabel}</span>
                                            {isAdmin && (
                                                <div className="mt-4 pt-4 border-t text-[10px] text-slate-400 font-bold flex flex-col gap-1 text-right font-black">
                                                    <span className="text-indigo-600 border-b border-indigo-50 mb-1 pb-1 uppercase tracking-tighter italic font-black">بيانات الدخول :</span>
                                                    <span>اسم المستخدم: {m.username}</span>
                                                    <span>كلمة المرور: {m.password}</span>
                                                    <span>رقم الجوال: {m.phone}</span>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6 text-right font-black font-black">
                            <div className="bg-white rounded-[2rem] w-full max-w-lg shadow-2xl overflow-hidden animate-in zoom-in-95 duration-300 font-black font-black">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50/50 font-black font-black">
                                    <h3 className="text-lg font-black text-slate-900 tracking-tighter uppercase font-black">
                                        {showModal === 'change-password' ? 'تغيير كلمة المرور' : 'إضافة جديد'}
                                    </h3>
                                    <button onClick={()=>{setShowModal(null); setPostError(''); setSuccessMsg('');}} className="p-2 bg-white rounded-xl text-slate-400 hover:text-rose-600 shadow-sm font-black"><Icon name="x" size={20}/></button>
                                </div>
                                <div className="p-8 space-y-5 max-h-[70vh] overflow-y-auto custom-scrollbar font-black text-right font-black">
                                    {postError && <div className="bg-rose-50 text-rose-600 p-3 rounded-xl text-xs font-black border border-rose-100 text-center font-black">{postError}</div>}
                                    {successMsg && <div className="bg-emerald-50 text-emerald-600 p-3 rounded-xl text-xs font-black border border-emerald-100 text-center font-black">{successMsg}</div>}
                                    
                                    {showModal === 'change-password' && (
                                        <>
                                            <div className="space-y-1 font-black"><p className="text-[10px] font-black text-slate-400 pr-1 italic">كلمة المرور الجديدة:</p>
                                                <input className="w-full p-4 bg-slate-50 rounded-xl font-bold border text-right font-black" type="password" placeholder="أدخل كلمة المرور الجديدة" value={newPasswordValue} onChange={e=>setNewPasswordValue(e.target.value)} />
                                            </div>
                                            <button onClick={handleUpdatePassword} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-md uppercase font-black">تحديث كلمة المرور</button>
                                        </>
                                    )}

                                    {showModal === 'posts' && (
                                        <>
                                            <div className="space-y-1 font-black font-black"><p className="text-[10px] font-black text-slate-400 pr-1 italic font-black">العنوان:</p><input className="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none text-right font-black font-black" placeholder="العنوان" value={newPost.title} onChange={e=>setNewPost({...newPost, title: e.target.value})} /></div>
                                            <div className="grid grid-cols-2 gap-3 font-black"><div className="space-y-1 font-black font-black font-black"><p className="text-[10px] font-black text-slate-400 pr-1 italic">التصنيف:</p><select className="w-full p-4 bg-slate-50 rounded-xl font-black text-right border font-black" value={newPost.type} onChange={e=>setNewPost({...newPost, type: e.target.value})}><option>إعلان عام</option><option>مسابقة</option></select></div><div className="space-y-1 font-black"><p className="text-[10px] font-black text-slate-400 pr-1 italic">المدة:</p><select className="w-full p-4 bg-slate-50 rounded-xl font-black text-right border font-black" value={newPost.duration} onChange={e=>setNewPost({...newPost, duration: e.target.value})}><option>يوم</option><option>يومان</option><option>3 أيام</option><option>أسبوع</option></select></div></div>
                                            <div className="space-y-1 font-black"><p className="text-[10px] font-black text-slate-400 pr-1 italic">المحتوى:</p><textarea className="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none text-right resize-none font-black font-black" rows="3" placeholder="تفاصيل المنشور" value={newPost.content} onChange={e=>setNewPost({...newPost, content: e.target.value})}></textarea></div>
                                            <div className="space-y-1 font-black"><p className="text-[10px] font-black text-slate-400 pr-1 italic">إضافة وسائط:</p><div className="p-6 border border-dashed border-indigo-100 rounded-xl bg-indigo-50/30 text-center relative font-black">{isProcessingFile && <div className="absolute inset-0 bg-white/50 flex items-center justify-center z-10 font-black"><div className="loader font-black font-black"></div></div>}<input type="file" accept="image/*,video/*" className="w-full text-xs font-bold font-black" onChange={e => processFile(e, 'post')} /></div></div>
                                            <button onClick={()=>save('posts', newPost)} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-md uppercase font-black font-black">نشر</button>
                                        </>
                                    )}
                                    {showModal === 'tasks' && (
                                        <>
                                            <div className="space-y-1 font-black"><p className="text-[10px] font-black text-slate-400 pr-1 italic font-black">عنوان المهمة:</p><input className="w-full p-4 bg-slate-50 rounded-xl font-bold border text-right font-black" placeholder="عنوان المهمة" value={newTask.title} onChange={e=>setNewTask({...newTask, title: e.target.value})} /></div>
                                            <div className="grid grid-cols-2 gap-3 font-black">
                                                <div className="space-y-1 font-black"><p className="text-[10px] font-black text-slate-400 pr-1 italic font-black">إلى:</p><select className="w-full p-4 bg-slate-50 rounded-xl font-black text-right border font-black" value={newTask.assignedTo} onChange={e=>setNewTask({...newTask, assignedTo: e.target.value})}><option value="">-- اختر --</option><option value={adminData.name}>{adminData.name} (أنا)</option>{members.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}</select></div>
                                                <div className="space-y-1 font-black font-black"><p className="text-[10px] font-black text-slate-400 pr-1 italic">التاريخ:</p><input type="date" className="w-full p-4 bg-slate-50 rounded-xl font-black border font-black font-black" value={newTask.taskDate} onChange={e=>setNewTask({...newTask, taskDate: e.target.value})} /></div>
                                            </div>
                                            <div className="space-y-1 font-black"><p className="text-[10px] font-black text-slate-400 pr-1 italic">التفاصيل:</p><textarea className="w-full p-4 bg-slate-50 rounded-xl font-bold border text-right resize-none font-black font-black" rows="2" placeholder="التفاصيل .." value={newTask.content} onChange={e=>setNewTask({...newTask, content: e.target.value})}></textarea></div>
                                            <div className="p-6 border border-dashed border-indigo-100 rounded-xl bg-indigo-50/30 text-center relative font-black font-black">{isProcessingFile && <div className="absolute inset-0 bg-white/50 flex items-center justify-center z-10 font-black"><div className="loader font-black font-black"></div></div>}<p className="text-xs font-black text-slate-400 mb-2 italic text-center font-bold">إرفاق مستند أو صورة</p><input type="file" className="w-full text-xs font-bold font-black" onChange={e => processFile(e, 'task')} /></div>
                                            <button onClick={()=>save('tasks', newTask)} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-md uppercase font-black text-center font-black">إرسال المهمة</button>
                                        </>
                                    )}
                                    {showModal === 'members' && (
                                        <>
                                            <div className="grid grid-cols-2 gap-3 font-black"><input className="w-full p-4 bg-slate-50 rounded-xl font-bold border text-right font-black" placeholder="الاسم الكامل" value={newMember.name} onChange={e=>setNewMember({...newMember, name: e.target.value})} /><input className="w-full p-4 bg-slate-50 rounded-xl font-bold border text-right font-black" placeholder="المسمى الوظيفي" value={newMember.roleLabel} onChange={e=>setNewMember({...newMember, roleLabel: e.target.value})} /></div>
                                            <input className="w-full p-4 bg-slate-50 rounded-xl font-bold border text-right font-black" placeholder="05xxxxxxxx" value={newMember.phone} onChange={e=>setNewMember({...newMember, phone: e.target.value.replace(/\D/g, '').substring(0, 10)})} />
                                            <div className="bg-slate-950 p-6 rounded-2xl space-y-4 font-black"><p className="text-[10px] font-black text-amber-400 uppercase tracking-widest font-black uppercase tracking-widest font-black">بيانات الدخول :</p><input className="w-full p-3.5 bg-white/5 border border-white/10 rounded-xl text-white text-right font-black" placeholder="اسم المستخدم" value={newMember.username} onChange={e=>setNewMember({...newMember, username: e.target.value})} /><input className="w-full p-3.5 bg-white/5 border border-white/10 rounded-xl text-white text-right font-black" type="password" placeholder="كلمة المرور" value={newMember.password} onChange={e=>setNewMember({...newMember, password: e.target.value})} /></div>
                                            <button onClick={()=>save('members', newMember)} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-black shadow-md font-black font-black text-center uppercase">إضافة للفريق</button>
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {completingTask && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[1100] flex items-center justify-center p-6 text-right font-black font-black">
                            <div className="bg-white rounded-[2rem] p-10 max-w-sm w-full shadow-2xl animate-in zoom-in-95 duration-300 font-black"><h3 className="text-xl font-black mb-4 uppercase font-black text-right">إكمال المهمة</h3><p className="text-slate-500 text-xs mb-6 font-bold font-black text-right">هل قمت بإنهاء المهمة؟ يمكنك إرفاق ملف كإثبات (اختياري).</p><div className="p-6 border border-dashed border-indigo-100 rounded-xl bg-indigo-50/30 text-center relative mb-6 font-black font-black">{isProcessingFile && <div className="absolute inset-0 bg-white/50 flex items-center justify-center z-10 font-black"><div className="loader font-black"></div></div>}<Icon name="upload" size={24} className="mx-auto text-indigo-400 mb-2 font-black" /><input type="file" className="w-full text-xs font-bold font-black" onChange={e => processFile(e, 'proof')} /></div><div className="flex gap-3 font-black font-black"><button onClick={() => toggleTaskStatus(completingTask, taskProof)} className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-black uppercase shadow-md font-black text-center">إتمام</button><button onClick={() => {setCompletingTask(null); setTaskProof(null);}} className="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-black uppercase font-black text-center">إلغاء</button></div></div>
                        </div>
                    )}

                    {zoomMedia && (
                        <div className="fixed inset-0 bg-slate-950/95 z-[1200] flex items-center justify-center p-4 font-black" onClick={() => setZoomMedia(null)}><button className="absolute top-6 right-6 text-white/50 hover:text-white bg-white/10 p-3 rounded-full font-black font-black" onClick={() => setZoomMedia(null)}><Icon name="x" size={24} /></button><div className="max-w-4xl max-h-[85vh] text-center font-black" onClick={e => e.stopPropagation()}>{zoomMedia.startsWith('data:video/') ? <video src={zoomMedia} controls autoPlay className="max-w-full max-h-[85vh] rounded-2xl shadow-2xl font-black font-black" /> : <img src={zoomMedia} className="max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl font-black font-black" />}</div></div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
